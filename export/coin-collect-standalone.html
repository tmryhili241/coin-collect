  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

fter=...     — טקסט אחרי האנימציה\n       data-button-before   / ?btn=...       — טקסט כפתור לפני\n       data-button-after    / ?btnAfter=...  — טקסט כפתור אחרי\n       data-show-total      / ?total=1|0     — האם להציג סכום כולל (ברירת מחדל: 1)\n       data-auto            / ?auto=0|1      — להפעיל אוטומטית בטעינה (ברירת מחדל: 0)\n  */\n\n  .ols-treasure {\n    direction: rtl;\n    font-family: 'Rubik','Helvetica Neue',Arial,sans-serif;\n    color: #2A2620;\n    max-width: 760px;\n    margin: 0 auto;\n    padding: 16px;\n    position: relative;\n  }\n\n  /* \"במה\" — שטח שבו המטבעות יכולים לעוף */\n  .ols-stage {\n    position: relative;\n    height: 280px;\n    display: grid;\n    place-items: center;\n    overflow: visible;\n  }\n\n  /* הקלף האוצר במרכז */\n  .ols-card {\n    position: relative;\n    background-color: #FAF6EA;\n    background-image:\n      radial-gradient(ellipse 80% 60% at 30% 20%, rgba(244,184,58,0.10), transparent 60%),\n      radial-gradient(ellipse 70% 50% at 80% 90%, rgba(213,188,145,0.18), transparent 60%);\n    border: 1.5px solid rgba(139,105,20,0.35);\n    border-radius: 18px;\n    padding: 20px 28px 20px 24px;\n    display: flex;\n    align-items: center;\n    gap: 22px;\n    box-shadow:\n      inset 0 1px 0 rgba(255,255,255,0.5),\n      0 4px 14px rgba(80,68,93,0.10),\n      0 12px 28px rgba(80,68,93,0.08);\n    min-width: 360px;\n    z-index: 1;\n    transition: transform 0.3s cubic-bezier(.25,1.4,.5,1), box-shadow 0.3s;\n  }\n  .ols-card::before {\n    /* טקסטורת נייר עדינה */\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    border-radius: inherit;\n    background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.85 0 0 0 0 0.78 0 0 0 0 0.65 0 0 0 0.12 0'/><\u002Ffilter><rect width='200' height='200' filter='url(%23n)'/><\u002Fsvg>\");\n    opacity: 0.5;\n    pointer-events: none;\n    mix-blend-mode: multiply;\n  }\n  .ols-card > * { position: relative; z-index: 1; }\n  .ols-card.ols-card--bump {\n    transform: scale(1.05);\n    box-shadow:\n      inset 0 1px 0 rgba(255,255,255,0.5),\n      0 6px 18px rgba(244,184,58,0.25),\n      0 14px 32px rgba(80,68,93,0.12);\n  }\n\n  .ols-card-coin {\n    width: 84px; height: 84px;\n    flex-shrink: 0;\n    filter: drop-shadow(0 3px 6px rgba(80,68,93,0.25));\n    transform-origin: 50% 55%;\n    transition: transform 0.3s;\n  }\n  .ols-card.ols-card--bump .ols-card-coin {\n    animation: ols-coin-spin 0.5s ease-out;\n  }\n  @keyframes ols-coin-spin {\n    from { transform: rotate(-15deg) scale(1); }\n    50%  { transform: rotate(8deg) scale(1.15); }\n    to   { transform: rotate(0) scale(1); }\n  }\n\n  .ols-card-text {\n    flex: 1;\n    text-align: right;\n  }\n  .ols-card-balance {\n    font-family: 'Rubik', sans-serif;\n    font-size: 38px;\n    font-weight: 900;\n    color: #2C4A60;\n    line-height: 1;\n    font-variant-numeric: tabular-nums;\n    letter-spacing: -0.02em;\n    display: flex;\n    align-items: baseline;\n    gap: 10px;\n  }\n  .ols-card-balance .ols-balance-num {\n    color: #2C4A60;\n    transition: color 0.3s;\n  }\n  .ols-card.ols-card--bump .ols-balance-num {\n    color: #B8860B;\n  }\n  .ols-card-balance .ols-balance-label {\n    font-size: 13px;\n    font-weight: 700;\n    color: #837C70;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n  }\n  .ols-card-msg {\n    font-size: 14.5px;\n    color: #4A453E;\n    margin-top: 8px;\n    line-height: 1.5;\n    font-weight: 500;\n    min-height: 1.5em;\n    transition: opacity 0.3s;\n    max-width: 32ch;\n  }\n  .ols-card-msg.ols-msg-fade {\n    opacity: 0;\n  }\n\n  /* כפתור הפעלה */\n  .ols-trigger {\n    display: block;\n    margin: 18px auto 0;\n    background: #F4B83A;\n    color: #2C4A60;\n    border: none;\n    border-radius: 999px;\n    padding: 13px 38px;\n    font-famil );\n  const balanceEl = document.getElementById('ols-balance');\n  const msgEl     = document.getElementById('ols-msg');\n  const triggerBtn= document.getElementById('ols-trigger');\n  const hintEl    = document.getElementById('ols-hint');\n\n  // קריאת פרמטרים מ-URL (גם אם משובץ כ-iframe)\n  const params = new URLSearchParams(window.location.search);\n  function attr(name, urlKey, def) {\n    const fromUrl  = params.get(urlKey);\n    const fromAttr = root.dataset[name];\n    if (fromUrl !== null && fromUrl !== '') return fromUrl;\n    if (fromAttr !== undefined && fromAttr !== '') return fromAttr;\n    return def;\n  }\n  const coinsAdd     = Math.max(1, parseInt(attr('coinsAdd',     'add',      '4'), 10));\n  const textBefore   = attr('textBefore',   'before',   'תאספו את המטבעות שצברתם בפרק הזה');\n  const textAfter    = attr('textAfter',    'after',    'מצוין! +{add} מטבעות זהב נכנסו לאוצר שלכם').replace('{add}', coinsAdd);\n  const buttonBefore = attr('buttonBefore', 'btn',      'אספו את המטבעות');\n  const buttonAfter  = attr('buttonAfter',  'btnAfter', 'המשך');\n  const showTotal    = attr('showTotal',    'total',    '1') !== '0';\n  const autoStart    = attr('auto',         'auto',     '0') === '1';\n\n  // ============ storage ============\n  const STORAGE_KEY = 'olsCoins';\n  let memoryFallback = 0;\n  function readStore(){\n    try { const v = localStorage.getItem(STORAGE_KEY); if (v !== null) return parseInt(v,10)||0; } catch(e){}\n    try { const v = sessionStorage.getItem(STORAGE_KEY); if (v !== null) return parseInt(v,10)||0; } catch(e){}\n    return memoryFallback;\n  }\n  function writeStore(n){\n    memoryFallback = n;\n    try { localStorage.setItem(STORAGE_KEY, String(n)); } catch(e){}\n    try { sessionStorage.setItem(STORAGE_KEY, String(n)); } catch(e){}\n    try { window.parent.postMessage({type:'ols-coins-updated', value:n}, '*'); } catch(e){}\n  }\n\n  // ============ initial state ============\n  const startBalance = readStore();\n  balanceEl.textContent = showTotal ? startBalance : '+0';\n  msgEl.textContent = textBefore;\n  triggerBtn.textContent = buttonBefore + ' (+' + coinsAdd + ')';\n  hintEl.textContent = 'לחיצה תוסיף את המטבעות לאוצר שלכם';\n\n  // ============ flight logic ============\n  let isRunning = false;\n\n  function spawnCoin(idx, total, onArrive){\n    const coin = document.createElement('div');\n    coin.className = 'ols-flying';\n    stage.appendChild(coin);\n\n    // מיקום היעד = מרכז הקלף ביחס לבמה\n    const stageRect = stage.getBoundingClientRect();\n    const cardRect  = card.getBoundingClientRect();\n    const endX = cardRect.left + cardRect.width / 2 - stageRect.left;\n    const endY = cardRect.top + cardRect.height / 2 - stageRect.top;\n\n    // מיקום מוצא = פינה אקראית של הבמה (נכנסים מבחוץ)\n    const sw = stage.clientWidth;\n    const sh = stage.clientHeight;\n    const side = idx % 4;\n    let startX, startY;\n    const margin = 40;\n    switch(side){\n      case 0: startX = sw + margin; startY = sh * (0.15 + Math.random() * 0.7); break; // ימין\n      case 1: startX = -margin;     startY = sh * (0.15 + Math.random() * 0.7); break; // שמאל\n      case 2: startX = sw * (0.15 + Math.random() * 0.7); startY = -margin;     break; // למעלה\n      default:startX = sw * (0.15 + Math.random() * 0.7); startY = sh + margin;\n    }\n\n    // נקודת בקרה לקשת\n    const midX = (startX + endX) / 2 + (Math.random() - 0.5) * 120;\n    const midY = Math.min(startY, endY) - 80 - Math.random() * 60;\n\n    coin.style.left = '0';\n    coin.style.top  = '0';\n\n    const dur = 950 + idx * 80 + Math.random() * 250;\n    const rotStart = (Math.random() - 0.5) * 360;\n    const rotEnd   = rotStart + 540 + Math.random() * 360;\n\n    const t0 = performance.now();\n    const tickInterval = 16; // ~60fps\n    const intervalId = setInterval(() => {\n      const t = performance.now();\n      const k = Math.min(1, (t - t0) / dur);\n      const eased = k;\n      const u = 1 - eased;\n      const x = u*u*startX + 2*u*eased*midX + eased*eased*endX;\n      const y = u*u*startY + 2*u*eased*midY + eased*eased*endY;\n      const scale = 0.7 + 0.4 * Math.sin(k * Math.PI);\n      const land  = k > 0.88 ? (k - 0.88) / 0.12 : 0;\n      const finalScale = scale * (1 - land * 0.6);\n      const rot = rotStart + (rotEnd - rotStart) * k;\n      const opacity = k < 0.08 ? k / 0.08 : (k > 0.96 ? Math.max(0, (1 - k) / 0.04) : 1);\n\n      coin.style.transform =\n        'translate(' + x + 'px,' + y + 'px) translate(-50%,-50%) rotate(' + rot + 'deg) scale(' + Math.max(0.05, finalScale) + ')';\n      coin.style.opacity = opacity;\n\n      if (k >= 1) {\n        clearInterval(intervalId);\n        coin.remove();\n        if (onArrive) onArrive();\n      }\n    }, tickInterval);\n  }\n\n  function bumpCard(){\n    card.classList.remove('ols-card--bump');\n    void card.offsetWidth;\n    card.classList.add('ols-card--bump');\n    setTimeout(()=> card.classList.remove('ols-card--bump'), 600);\n  }\n\n  function animateBalance(from, to, duration){\n    const t0 = performance.now();\n    const id = setInterval(() => {\n      const t = performance.now();\n      const k = Math.min(1, (t - t0) / duration);\n      const eased = 1 - Math.pow(1 - k, 3);\n      const v = Math.round(from + (to - from) * eased);\n      balanceEl.textContent = showTotal ? v : '+' + (v - startBalance);\n      if (k >= 1) clearInterval(id);\n    }, 16);\n  }\n\n  function fadeMsgTo(text){\n    msgEl.classList.add('ols-msg-fade');\n    setTimeout(() => {\n      msgEl.textContent = text;\n      msgEl.classList.remove('ols-msg-fade');\n    }, 220);\n  }\n\n  // ============ main run ============\n  function run(){\n    if (isRunning) return;\n    isRunning = true;\n    triggerBtn.disabled = true;\n    hintEl.textContent = 'המטבעות בדרך…';\n    hintEl.classList.remove('ols-hint--success');\n\n    let arrived = 0;\n    for (let i = 0; i < coinsAdd; i++){\n      setTimeout(() => {\n        spawnCoin(i, coinsAdd, () => {\n          arrived++;\n          bumpCard();\n          // עדכון מספר אגרסיבי בכל הגעה\n          const newTotal = startBalance + arrived;\n          writeStore(newTotal);\n          // אנימציית ספירה (קצרה) למספר הבא\n          const prev = startBalance + (arrived - 1);\n          animateBalance(prev, newTotal, 350);\n\n          if (arrived === coinsAdd){\n            // סיום\n            setTimeout(() => {\n              fadeMsgTo(textAfter);\n              triggerBtn.textContent = buttonAfter;\n              triggerBtn.disabled = false;\n              hintEl.textContent = '✓ נצברו ' + coinsAdd + ' מטבעות לאוצר שלכם';\n              hintEl.classList.add('ols-hint--success');\n              isRunning = false;\n            }, 250);\n          }\n        });\n      }, i * 180);\n    }\n  }\n\n  // ============ wiring ============\n  triggerBtn.addEventListener('click', () => {\n    if (triggerBtn.textContent === buttonAfter && !isRunning){\n      // אחרי הצבירה — הכפתור הוא \"המשך\"\n      try { window.parent.postMessage({type:'ols-treasure-next'}, '*'); } catch(e){}\n      return;\n    }\n    run();\n  });\n\n  // חשיפה גלובלית — לבדיקות\n  window.olsCollect = run;\n  window.olsResetCoins = () => {\n    writeStore(0);\n    balanceEl.textContent = showTotal ? 0 : '+0';\n    msgEl.textContent = textBefore;\n    triggerBtn.textContent = buttonBefore + ' (+' + coinsAdd + ')';\n    triggerBtn.disabled = false;\n    hintEl.textContent = 'לחיצה תוסיף את המטבעות לאוצר שלכם';\n    hintEl.classList.remove('ols-hint--success');\n  };\n\n  if (autoStart) setTimeout(run, 500);\n})();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
